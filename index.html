<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="big-container">
      <div class="small-container">
        <div class="calculator-container">
          <div class="calculator-body">
            <div class="screen-big">
              <div class="screen-small">Numbers</div>
            </div>
            <div class="button-container">
              <div class="clear">
                <button class="clear">Clear</button>
              </div>
              <div class="main-buttons">
                <div class="numbers">
                  <button class="number">1</button>
                  <button class="number">2</button>
                  <button class="number">3</button>
                  <button class="number">4</button>
                  <button class="number">5</button>
                  <button class="number">6</button>
                  <button class="number">7</button>
                  <button class="number">8</button>
                  <button class="number">9</button>
                  <button class="operator">±</button>
                  <button class="number">0</button>
                  <button class="decimal">.</button>
                </div>
                <div class="operators">
                  <button class="back">back</button>
                  <button class="operator">/</button>
                  <button class="operator">*</button>
                  <button class="operator">+</button>
                  <button class="operator">-</button>
                  <div class="equals">
                    <button class="operator">=</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="info-container">
          <div class="heading-container">
            <h1 id="heading">Calculator</h1>
          </div>
          <div class="text-container">
            <p>
              This is my calculator project for
              <a href="https://theodinproject.com">The Odin Project</a> this was
              more difficult than I had anticipated, yet here we are. now do
              math Young One... but don't do meth!
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="./scripts.js"></script>
  </body>
</html>
